services:
  - type: web
    name: stock-agent-bot
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TIMEZONE
        value: "America/New_York"
      - key: USE_SQLITE
        value: "1"
      - key: BRIEFING_AUTO_SEND
        value: "1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: SMS_GATEWAY
        sync: false
