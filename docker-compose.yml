version: "3.8"

services:
  # One-off scan
  scan:
    build: .
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./watchlist.csv:/app/watchlist.csv
      - ./portfolio.json:/app/portfolio.json
    command: python3 cli.py scan

  # Paper trading scan
  paper:
    build: .
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./watchlist.csv:/app/watchlist.csv
      - ./portfolio.json:/app/portfolio.json
    command: python3 cli.py scan --paper

  # Scheduled scanning (runs continuously)
  scheduler:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./watchlist.csv:/app/watchlist.csv
      - ./portfolio.json:/app/portfolio.json
    command: python3 cli.py schedule --paper

  # Web dashboard
  dashboard:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      - ./logs:/app/logs
      - ./watchlist.csv:/app/watchlist.csv
      - ./portfolio.json:/app/portfolio.json
    command: python3 cli.py dashboard

  # Run tests
  test:
    build: .
    command: python3 -m pytest tests/ -v --tb=short
