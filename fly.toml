app = "stock-agent-bot"
primary_region = "ewr"

[build]

[env]
  PYTHONUNBUFFERED = "1"
  TIMEZONE = "America/New_York"
  USE_SQLITE = "1"
  BRIEFING_AUTO_SEND = "1"

# No HTTP service needed — this is a background worker
# (telegram bot uses long-polling, not webhooks)

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
